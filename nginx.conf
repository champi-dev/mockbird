server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10m;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Resolve upstream at request time so nginx starts before the API container
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Django API (includes SSE log streaming — keep buffering off)
    location /api/ {
        set $mockbird_upstream http://mockbird-server:8000;
        proxy_pass $mockbird_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_set_header Connection '';
    }

    # The live mock endpoints users share
    location /m/ {
        set $mockbird_upstream http://mockbird-server:8000;
        proxy_pass $mockbird_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        set $mockbird_upstream http://mockbird-server:8000;
        proxy_pass $mockbird_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Service worker must never be cached, or clients get stuck on an old
    # version and stop receiving updates. Scope is the whole origin.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    # Serve the manifest with the correct type (nginx's default mime.types
    # doesn't map .webmanifest).
    location = /manifest.webmanifest {
        types { } default_type application/manifest+json;
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
